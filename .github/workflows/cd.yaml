name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: |
          docker build -t ${{secrets.DOCKER_HUB_USERNAME}}/goal-radar-web . -f Dockerfile.dev

      - name: Push Docker image to DockerHub
        run: |
          echo ${{secrets.DOCKER_HUB_TOKEN_GOAL_RADAR_WEB}} | docker login -u ${{secrets.DOCKER_HUB_USERNAME}} --password-stdin
          docker push ${{secrets.DOCKER_HUB_USERNAME}}/goal-radar-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.DROPLET_IP}}
          key: ${{secrets.SSH_PRIVATE_KEY}}
          username: ${{secrets.DROPLET_USER}}

          script: |
            docker stop goal-radar-web-container || true
            docker pull ${{secrets.DOCKER_HUB_USERNAME}}/goal-radar-web
            docker run -d -it --rm --name goal-radar-web-container -p 3000:3000 ${{secrets.DOCKER_HUB_USERNAME}}/goal-radar-web
